[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run frontend"

[deploy]
startCommand = "npm run backend"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "api"
internalPort = 3080

[[services]]
name = "mongodb"
image = "mongo:8.0"
internalPort = 27017
volumes = ["/data/db"]

[[services]]
name = "meilisearch"
image = "getmeili/meilisearch:v1.35.1"
internalPort = 7700
volumes = ["/meili_data"]
